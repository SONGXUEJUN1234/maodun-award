awards:
  - year: 2023
    award_name: "第十一届茅盾文学奖"
    works:
      - title: "雪山大地"
        author: "杨志军"
        author_bio: "出生于青海，当代作家。著有长篇小说《环湖崩溃》《海荒的林》等。"
        publisher: "作家出版社"
        year_published: "2022"
        description: "小说以改革开放以来青海藏区的历史变迁为背景，用诗意的语言讲述父辈建设边疆的壮阔历程。"
        slug: "xueshandadi"
      - title: "宝水"
        author: "乔叶"
        author_bio: "河南修武人，当代作家。著有小说《最慢的是活着》《认罪书》等。"
        publisher: "北京十月文艺出版社"
        year_published: "2022"
        description: "以一个村庄的变迁为切入点，展现新时代乡村的生机与活力，书写中国乡村的现代转型。"
        slug: "baoshui"
      - title: "本巴"
        author: "刘亮程"
        author_bio: "新疆沙湾人，当代作家。著有散文集《一个人的村庄》《虚土》等。"
        publisher: "译林出版社"
        year_published: "2022"
        description: "以蒙古族史诗《江格尔》为背景，构建了一个关于时间、记忆与存在的梦幻世界。"
        slug: "benba"
      - title: "千里江山图"
        author: "孙甘露"
        author_bio: "上海人，当代作家。著有小说《呼吸》《我是少年酒坛子》等，先锋文学代表人物之一。"
        publisher: "上海文艺出版社"
        year_published: "2022"
        description: "以1930年代的上海为背景，讲述地下工作者的革命故事，展现理想与信仰的力量。"
        slug: "qianlijiangshantu"
      - title: "回响"
        author: "东西"
        author_bio: "广西天峨人，当代作家。著有小说《回声》《耳光响亮》《篡改的命》等。"
        publisher: "人民文学出版社"
        year_published: "2021"
        description: "以一起刑事案件为线索，探索当代人内心的困惑与挣扎，追问人性的真相。"
        slug: "huixiang"

  - year: 2019
    award_name: "第十届茅盾文学奖"
    works:
      - title: "人世间"
        author: "梁晓声"
        author_bio: "黑龙江哈尔滨人，当代作家。著有《这是一片神奇的土地》《今夜有暴风雪》等。"
        publisher: "中国青年出版社"
        year_published: "2017"
        description: "以北方城市平民社区为背景，跨越五十年时间，展现中国社会的巨大变迁与普通人家的悲欢离合。"
        slug: "renshijian"
      - title: "牵风记"
        author: "徐怀中"
        author_bio: "河北邯郸人，当代作家。著有《我们播种爱情》《西线轶事》等。"
        publisher: "人民文学出版社"
        year_published: "2018"
        description: "以抗日战争为背景，讲述骑兵部队的成长历程，描绘战火中的青春与爱情。"
        slug: "qianfengji"
      - title: "北上"
        author: "徐则臣"
        author_bio: "江苏东海人，当代作家。著有《耶路撒冷》《王城如海》等。"
        publisher: "北京十月文艺出版社"
        year_published: "2018"
        description: "以京杭大运河为线索，跨越百年历史，讲述几个家族的兴衰与中国的现代化进程。"
        slug: "beishang"
      - title: "主角"
        author: "陈彦"
        author_bio: "陕西镇安人，当代作家。著有戏剧《迟开的玫瑰》《大树西迁》等。"
        publisher: "作家出版社"
        year_published: "2018"
        description: "以秦腔艺人忆秦娥的传奇人生为主线，展现中国传统戏曲艺术的魅力与艺人的命运沉浮。"
        slug: "zhujue"
      - title: "应物兄"
        author: "李洱"
        author_bio: "河南济源人，当代作家。著有《花腔》《石榴树上结樱桃》等。"
        publisher: "人民文学出版社"
        year_published: "2018"
        description: "以儒学研究为背景，通过知识分子的生活与思考，反映当代中国的精神图景。"
        slug: "yingwuxiong"
